<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Papa's Day ❤️</title>
<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#6dd5ed,#2193b0);
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
    color:white;
}
.card{
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(12px);
    padding:30px;
    border-radius:25px;
    width:85%;
    max-width:380px;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
    z-index:10;
}
h1{
    font-size:2em;
    margin-bottom:10px;
}
button{
    margin-top:15px;
    padding:12px 22px;
    border:none;
    border-radius:50px;
    background:white;
    color:#2193b0;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}
button:hover{
    transform:scale(1.08);
}
#message{
    margin-top:20px;
    font-size:18px;
    display:none;
    animation:fade .8s;
}
#joke{
    margin-top:15px;
    font-style:italic;
}
@keyframes fade{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}
.heart{
    position:absolute;
    color:pink;
    font-size:24px;
    animation:float 6s linear infinite;
}
@keyframes float{
0%{
transform:translateY(100vh) scale(.5);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(-120vh) scale(1.5);
opacity:0;
}
}
.confetti{
    position:absolute;
    width:10px;
    height:10px;
    animation:fall linear infinite;
}
@keyframes fall{
0%{
transform:translateY(-10vh) rotate(0deg);
}
100%{
transform:translateY(110vh) rotate(720deg);
}
}
</style>
</head>
<body>

<div class="card">
<h1>👨 Happy Papa's Day!</h1>
<p>To my papa</p>

<button onclick="showMessage()">Open Your Surprise 🎁</button>

<div id="message">
<h2>❤️ Thank You Papa ❤️</h2>

<p>
I hope we'll continue to say goodnights to each other for a long time.<br>
P.s durian smells bad
</p>

<button onclick="dadJoke()">One More Surprise 😂</button>

<div id="joke"></div>
</div>
</div>

<script>
const jokes=[
"Why don't eggs tell jokes? Because they'd crack each other up!",
"What do you call cheese that isn't yours? Nacho cheese!",
"I only know 25 letters of the alphabet. I don't know Y.",
"Why did the scarecrow win an award? He was outstanding in his field!",
"What do you call fake spaghetti? An impasta!"
];

function showMessage(){
document.getElementById("message").style.display="block";
confettiBurst();
}

function dadJoke(){
const random=jokes[Math.floor(Math.random()*jokes.length)];
document.getElementById("joke").innerHTML="😂 "+random;
}

function createHeart(){
const heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(Math.random()*3+4)+"s";
heart.style.fontSize=(Math.random()*20+18)+"px";
document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},7000);
}

setInterval(createHeart,400);

function confettiBurst(){
for(let i=0;i<120;i++){
const c=document.createElement("div");
c.className="confetti";

const colors=["#ff4757","#2ed573","#ffa502","#1e90ff","#ff6b81","#ffffff"];
c.style.background=colors[Math.floor(Math.random()*colors.length)];
c.style.left=Math.random()*100+"vw";
c.style.animationDuration=(Math.random()*2+2)+"s";
document.body.appendChild(c);

setTimeout(()=>{
c.remove();
},4000);
}
}
</script>

</body>
</html>
